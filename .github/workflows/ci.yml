name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  supabase-e2e:
    name: Supabase local DB e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3

      - name: Start local Supabase
        run: |
          supabase start \
            -x studio,imgproxy,inbucket,realtime,storage,edge-runtime,functions,vector,analytics

      - name: Export local Supabase credentials
        run: |
          chmod +x ./scripts/export-supabase-env.sh
          ./scripts/export-supabase-env.sh --github-env

      - name: Lint local database schema
        run: supabase db lint --local --fail-on error

      - name: Run real-data e2e against local DB
        run: npm run test:e2e

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
